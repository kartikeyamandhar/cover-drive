# Hooks run on staged files before each commit. The ruff and mypy hooks are
# `local` and invoke the tools through `uv run`, so they use the exact versions
# pinned in uv.lock rather than a separate mirror; this keeps pre-commit and CI
# on identical tool versions (a red-team concern in docs/phases/phase-0.md).
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=2048"]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
